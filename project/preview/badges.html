<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 220px; background: var(--bg); padding: 28px; box-sizing: border-box; }
  .meta { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); margin-bottom: 18px; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle); width: 100%; margin-bottom: 4px; }
  .b { font-family: var(--font-heading); font-size: 10px; font-weight: 700; letter-spacing: var(--tracking-wider); text-transform: uppercase; padding: 5px 10px; }
  .accent  { background: var(--accent); color: #000; }
  .outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
  .neutral { background: var(--bg-elev); color: var(--fg); border: 1px solid var(--border); }
  .stock   { color: var(--accent); border: 1px solid var(--accent); padding: 5px 10px 5px 22px; position: relative; font-family: var(--font-heading); font-size: 10px; font-weight: 700; letter-spacing: var(--tracking-wider); text-transform: uppercase; }
  .stock::before { content: ''; position: absolute; left: 8px; top: 50%; transform: translateY(-50%); width: 8px; height: 8px; background: var(--accent); border-radius: 50%; }
  .pill   { border-radius: 999px; }
</style></head>
<body>
<div class="card">
  <div class="meta">Tags · grade labels · stock indicators</div>
  <div class="row"><span class="label">Grade & spec</span>
    <span class="b accent">7A</span>
    <span class="b accent">UA Spec</span>
    <span class="b outline">Crown Pick</span>
    <span class="b neutral">EU 42 / US 8.5</span>
  </div>
  <div class="row"><span class="label">Status</span>
    <span class="stock">In Stock</span>
    <span class="b neutral">Low stock · 2 left</span>
    <span class="b neutral" style="opacity:.5">Sold out</span>
  </div>
  <div class="row"><span class="label">Pill / category</span>
    <span class="b neutral pill">Sneakers</span>
    <span class="b neutral pill">Apparel</span>
    <span class="b neutral pill">Accessories</span>
  </div>
</div>
</body></html>
