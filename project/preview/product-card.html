<!doctype html>
<html><head><meta charset="utf-8"><title>Product Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 380px; background: var(--bg); padding: 24px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .pc { background: var(--bg-elev); border: 1px solid var(--border); display: flex; flex-direction: column; transition: all var(--dur-base) var(--ease-out); }
  .pc:hover { border-color: var(--border-strong); transform: translateY(-2px); }
  .pc .img { aspect-ratio: 4/3; overflow: hidden; background: #1a1a1a; position: relative; }
  .pc img { width: 100%; height: 100%; object-fit: cover; }
  .pc .tag { position: absolute; top: 10px; left: 10px; background: var(--accent); color: #000; font-family: var(--font-heading); font-size: 9px; font-weight: 700; letter-spacing: var(--tracking-wider); text-transform: uppercase; padding: 4px 8px; }
  .pc .body { padding: 14px 16px 18px; display: flex; flex-direction: column; gap: 4px; }
  .pc .brand { font-family: var(--font-heading); font-size: 10px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); font-weight: 600; }
  .pc .name { font-family: var(--font-display); font-size: 20px; text-transform: uppercase; color: var(--fg); line-height: 1.05; margin-top: 2px; }
  .pc .price { font-family: var(--font-heading); font-weight: 600; color: var(--fg); margin-top: 8px; font-size: 14px; }
  .pc .strike { color: var(--fg-subtle); text-decoration: line-through; margin-left: 8px; font-weight: 400; font-size: 13px; }
</style></head>
<body>
<div class="card">
  <div class="pc">
    <div class="img"><span class="tag">7A</span><img src="../assets/product-airjordan.jpg"></div>
    <div class="body">
      <span class="brand">Air Jordan</span>
      <span class="name">AJ1 Mid · Panda</span>
      <span class="price">₹4,499 <span class="strike">₹14,995</span></span>
    </div>
  </div>
  <div class="pc">
    <div class="img"><span class="tag">UA Spec</span><img src="../assets/product-newbalance.jpg"></div>
    <div class="body">
      <span class="brand">New Balance</span>
      <span class="name">530 · Cream Sea Salt</span>
      <span class="price">₹3,899 <span class="strike">₹11,499</span></span>
    </div>
  </div>
</div>
</body></html>
