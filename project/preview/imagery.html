<!doctype html>
<html><head><meta charset="utf-8"><title>Imagery</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 260px; background: var(--bg); padding: 24px; box-sizing: border-box; }
  .meta { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr; gap: 12px; height: 180px; }
  .tile { position: relative; overflow: hidden; }
  .tile img { width: 100%; height: 100%; object-fit: cover; }
  .tile .tag { position: absolute; bottom: 8px; left: 8px; font-family: var(--font-heading); font-size: 9px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: #fff; background: rgba(0,0,0,.55); backdrop-filter: blur(8px); padding: 4px 8px; }
</style></head>
<body>
<div class="card">
  <div class="meta">Imagery · warm lifestyle · studio cut-outs · matte not glossy</div>
  <div class="grid">
    <div class="tile"><img src="../assets/insta-post-tote.jpg"><span class="tag">Lifestyle · warm wood</span></div>
    <div class="tile" style="background:#F2ECDD;"><img src="../assets/product-airjordan.jpg"><span class="tag">Studio cut-out</span></div>
    <div class="tile" style="background:#F2ECDD;"><img src="../assets/product-newbalance.jpg"><span class="tag">Studio cut-out</span></div>
  </div>
</div>
</body></html>
