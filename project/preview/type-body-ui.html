<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Body & UI</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 260px; background: var(--bg); padding: 28px 32px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 32px; }
  .col h5 { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); margin: 0 0 10px; font-weight: 600; }
  p { font-family: var(--font-body); font-size: 16px; line-height: 1.6; color: var(--fg); margin: 0; }
  .muted { color: var(--fg-muted); font-size: 14px; line-height: 1.55; margin-top: 8px; }
  .small { font-size: 12px; color: var(--fg-subtle); margin-top: 8px; }
  .eyebrow { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); font-weight: 600; }
  .spec { display: inline-block; padding: 4px 8px; border: 1px solid var(--accent); color: var(--accent); font-family: var(--font-heading); font-size: 10px; letter-spacing: var(--tracking-wider); text-transform: uppercase; }
  .specs { margin-top: 12px; display: flex; gap: 6px; }
  .mono { font-family: var(--font-mono); font-size: 12px; color: var(--fg-warm); margin-top: 8px; }
</style></head>
<body>
<div class="card">
  <div class="col">
    <h5>Body · Inter</h5>
    <p>7A construction. Genuine leather, stitched sole, original tooling box.</p>
    <div class="muted">Sized true to Nike US. Free shipping across India.</div>
    <div class="small">Caption · 12 px · ₹4,499</div>
  </div>
  <div class="col">
    <h5>Eyebrow · Spec labels</h5>
    <div class="eyebrow">UA Spec · 7A Quality</div>
    <div class="specs">
      <span class="spec">7A</span>
      <span class="spec">In stock</span>
      <span class="spec">EU 42</span>
    </div>
    <div class="mono">SKU TOH-AJ1-PND-42</div>
  </div>
</div>
</body></html>
