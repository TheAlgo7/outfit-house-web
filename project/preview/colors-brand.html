<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 220px; background: var(--bg); padding: 24px; box-sizing: border-box; display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .swatch { display: flex; flex-direction: column; justify-content: flex-end; padding: 14px; box-sizing: border-box; height: 172px; position: relative; border: 1px solid var(--border); }
  .swatch .name { font-family: var(--font-heading); font-weight: 700; font-size: 13px; letter-spacing: var(--tracking-wide); text-transform: uppercase; }
  .swatch .hex  { font-family: var(--font-mono); font-size: 11px; opacity: 0.7; margin-top: 2px; }
  .swatch .role { font-family: var(--font-heading); font-size: 10px; letter-spacing: var(--tracking-wider); text-transform: uppercase; opacity: 0.55; position: absolute; top: 12px; left: 14px; }
</style></head>
<body>
<div class="card">
  <div class="swatch" style="background:#000; color:#F2ECDD;">
    <div class="role">Primary</div>
    <div class="name">Black</div><div class="hex">#000000</div>
  </div>
  <div class="swatch" style="background:#F2ECDD; color:#000; border-color:transparent;">
    <div class="role" style="color:rgba(0,0,0,.55)">Secondary</div>
    <div class="name">Eggshell</div><div class="hex">#F2ECDD</div>
  </div>
  <div class="swatch" style="background:#E8D3B2; color:#000; border-color:transparent;">
    <div class="role" style="color:rgba(0,0,0,.55)">Warm Neutral</div>
    <div class="name">Hampton</div><div class="hex">#E8D3B2</div>
  </div>
  <div class="swatch" style="background:#E3A848; color:#000; border-color:transparent;">
    <div class="role" style="color:rgba(0,0,0,.55)">Accent · 5%</div>
    <div class="name">Indian Yellow</div><div class="hex">#E3A848</div>
  </div>
</div>
</body></html>
