<!doctype html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 180px; background: var(--bg); padding: 24px 32px; box-sizing: border-box; }
  .meta { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); margin-bottom: 18px; }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .swatch { width: 76px; height: 76px; background: var(--bg-elev); border: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
  .pill { width: 100px; height: 32px; background: var(--bg-elev); border: 1px solid var(--border); }
</style></head>
<body>
<div class="card">
  <div class="meta">Radii · industrial = sharp · cards 8 · pills only for tags</div>
  <div class="row">
    <div class="item"><div class="swatch" style="border-radius:0"></div><div class="name">0 · default</div></div>
    <div class="item"><div class="swatch" style="border-radius:2px"></div><div class="name">2 · sm</div></div>
    <div class="item"><div class="swatch" style="border-radius:4px"></div><div class="name">4 · md</div></div>
    <div class="item"><div class="swatch" style="border-radius:8px"></div><div class="name">8 · lg · card</div></div>
    <div class="item"><div class="swatch" style="border-radius:16px"></div><div class="name">16 · xl · modal</div></div>
    <div class="item"><div class="pill" style="border-radius:999px"></div><div class="name">pill · tags</div></div>
  </div>
</div>
</body></html>
