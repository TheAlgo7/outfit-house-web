<!doctype html>
<html><head><meta charset="utf-8"><title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 240px; background: var(--bg); padding: 28px; box-sizing: border-box; }
  .meta { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px 24px; }
  .field { display: flex; flex-direction: column; gap: 8px; }
  label { font-family: var(--font-heading); font-size: 10px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); font-weight: 600; }
  input, select {
    background: transparent; border: none; border-bottom: 1px solid var(--border-strong);
    color: var(--fg); padding: 10px 0; font-family: var(--font-body); font-size: 14px;
    transition: border-color var(--dur-base) var(--ease-out);
  }
  input:focus, select:focus { outline: none; border-bottom-color: var(--accent); }
  input::placeholder { color: var(--fg-subtle); }
  .sizes { display: flex; gap: 6px; flex-wrap: wrap; }
  .size { width: 42px; height: 42px; display: flex; align-items: center; justify-content: center; font-family: var(--font-heading); font-size: 12px; color: var(--fg); border: 1px solid var(--border-strong); cursor: pointer; }
  .size.sel { background: var(--fg); color: #000; border-color: var(--fg); }
  .size.dis { color: var(--fg-subtle); border-color: var(--border); position: relative; }
  .size.dis::after { content: ''; position: absolute; inset: 0; background: linear-gradient(45deg, transparent 48%, var(--border-strong) 49%, var(--border-strong) 51%, transparent 52%); }
</style></head>
<body>
<div class="card">
  <div class="meta">Form fields · underline · no rounded boxes</div>
  <div class="grid">
    <div class="field"><label>Email</label><input placeholder="you@email.com" value="ravi@delhi.in"></div>
    <div class="field"><label>City</label><select><option>New Delhi</option><option>Mumbai</option></select></div>
    <div class="field" style="grid-column: 1 / -1;"><label>Select Size · EU</label>
      <div class="sizes">
        <div class="size dis">39</div><div class="size">40</div><div class="size">41</div>
        <div class="size sel">42</div><div class="size">43</div><div class="size">44</div>
        <div class="size dis">45</div>
      </div>
    </div>
  </div>
</div>
</body></html>
