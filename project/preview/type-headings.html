<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 280px; background: var(--bg); padding: 28px 32px; box-sizing: border-box; }
  .row { display: flex; align-items: baseline; gap: 18px; padding: 8px 0; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); width: 60px; flex-shrink: 0; }
  .sample { color: var(--fg); flex: 1; }
  .h1 { font-family: var(--font-display); font-size: 48px; text-transform: uppercase; line-height: 1; }
  .h2 { font-family: var(--font-display); font-size: 32px; text-transform: uppercase; line-height: 1; }
  .h3 { font-family: var(--font-heading); font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .h4 { font-family: var(--font-heading); font-size: 18px; font-weight: 600; }
</style></head>
<body>
<div class="card">
  <div class="row"><span class="tag">H1 / 48</span><div class="sample h1">Air Jordan 1 Mid</div></div>
  <div class="row"><span class="tag">H2 / 32</span><div class="sample h2">Featured Drops</div></div>
  <div class="row"><span class="tag">H3 / 22</span><div class="sample h3">Genuine leather upper</div></div>
  <div class="row"><span class="tag">H4 / 18</span><div class="sample h4">Stitched sole construction</div></div>
</div>
</body></html>
