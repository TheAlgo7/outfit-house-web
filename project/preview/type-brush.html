<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Brush</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 240px; background: var(--bg); padding: 28px 32px; box-sizing: border-box; position: relative; }
  .meta { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); }
  .brush { font-family: var(--font-brush); color: var(--fg); font-size: 92px; line-height: 0.95; margin-top: 6px; }
  .accent { color: var(--accent); }
  .note { position: absolute; bottom: 18px; left: 32px; right: 32px; font-family: var(--font-body); font-size: 12px; color: var(--fg-subtle); border-top: 1px solid var(--border); padding-top: 10px; }
  .note b { color: var(--accent); font-weight: 500; }
</style></head>
<body>
<div class="card">
  <div class="meta">Brush · expressive · marketing only</div>
  <div class="brush">The <span class="accent">Outfit</span> House</div>
  <div class="note"><b>Never in UI.</b> Reserved for posters, hero takeovers, and the logo lockup. Always pairs with the crown mark.</div>
</div>
</body></html>
