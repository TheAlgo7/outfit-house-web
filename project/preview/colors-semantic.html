<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Semantic</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 280px; background: var(--bg); padding: 24px; box-sizing: border-box; display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .panel { padding: 16px; border: 1px solid var(--border); }
  .panel h4 { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; margin: 0 0 12px; color: var(--fg-muted); font-weight: 600; }
  .row { display: flex; align-items: center; gap: 10px; padding: 6px 0; font-family: var(--font-mono); font-size: 11px; }
  .chip { width: 18px; height: 18px; flex-shrink: 0; border: 1px solid rgba(255,255,255,0.08); }
  .name { color: var(--fg); flex: 1; }
  .val { color: var(--fg-subtle); }
  .light { background: var(--bg-light); }
  .light h4, .light .name { color: var(--fg-on-light); }
  .light h4 { color: rgba(0,0,0,0.55); }
  .light .val { color: rgba(0,0,0,0.5); }
  .light .chip { border-color: rgba(0,0,0,0.1); }
</style></head>
<body>
<div class="card">
  <div class="panel">
    <h4>Dark surface · default</h4>
    <div class="row"><span class="chip" style="background:#000"></span><span class="name">--bg</span><span class="val">#000</span></div>
    <div class="row"><span class="chip" style="background:#141414"></span><span class="name">--bg-elev</span><span class="val">#141414</span></div>
    <div class="row"><span class="chip" style="background:#F2ECDD"></span><span class="name">--fg</span><span class="val">eggshell</span></div>
    <div class="row"><span class="chip" style="background:rgba(242,236,221,.65)"></span><span class="name">--fg-muted</span><span class="val">65%</span></div>
    <div class="row"><span class="chip" style="background:#E3A848"></span><span class="name">--accent</span><span class="val">yellow</span></div>
    <div class="row"><span class="chip" style="background:rgba(242,236,221,.10);"></span><span class="name">--border</span><span class="val">10%</span></div>
  </div>
  <div class="panel light">
    <h4>Light surface · editorial</h4>
    <div class="row"><span class="chip" style="background:#F2ECDD"></span><span class="name">--bg-light</span><span class="val">eggshell</span></div>
    <div class="row"><span class="chip" style="background:#FAF6EC"></span><span class="name">--bg-light-elev</span><span class="val">#FAF6EC</span></div>
    <div class="row"><span class="chip" style="background:#000"></span><span class="name">--fg-on-light</span><span class="val">black</span></div>
    <div class="row"><span class="chip" style="background:rgba(0,0,0,.6)"></span><span class="name">--fg-muted-on-light</span><span class="val">60%</span></div>
    <div class="row"><span class="chip" style="background:#E3A848"></span><span class="name">--accent</span><span class="val">yellow</span></div>
    <div class="row"><span class="chip" style="background:rgba(0,0,0,.10)"></span><span class="name">--border-on-light</span><span class="val">10%</span></div>
  </div>
</div>
</body></html>
