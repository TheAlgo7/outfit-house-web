<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Warm scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 200px; background: #1A1A1A; padding: 24px; box-sizing: border-box; }
  .label { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); margin-bottom: 12px; }
  .group { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
  .row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .sw { height: 110px; display: flex; flex-direction: column; justify-content: flex-end; padding: 8px 10px; color: #000; }
  .sw .n { font-family: var(--font-heading); font-weight: 700; font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; }
  .sw .h { font-family: var(--font-mono); font-size: 9px; opacity: 0.6; }
  .group-title { font-family: var(--font-heading); font-weight: 700; font-size: 11px; color: #F2ECDD; letter-spacing: var(--tracking-wide); text-transform: uppercase; margin-bottom: 6px; }
</style></head>
<body>
<div class="card">
  <div class="label">Warm tones · Eggshell, Hampton, Yellow ramps</div>
  <div class="group">
    <div>
      <div class="group-title">Eggshell / Hampton</div>
      <div class="row">
        <div class="sw" style="background:#FAF6EC;"><div class="n">EGS 50</div><div class="h">#FAF6EC</div></div>
        <div class="sw" style="background:#F2ECDD;"><div class="n">EGS 100</div><div class="h">#F2ECDD</div></div>
        <div class="sw" style="background:#E8D3B2;"><div class="n">HMP 300</div><div class="h">#E8D3B2</div></div>
      </div>
    </div>
    <div>
      <div class="group-title">Yellow ramp</div>
      <div class="row">
        <div class="sw" style="background:#E8B561;"><div class="n">400</div><div class="h">#E8B561</div></div>
        <div class="sw" style="background:#E3A848;"><div class="n">500 · base</div><div class="h">#E3A848</div></div>
        <div class="sw" style="background:#C28C30; color:#000;"><div class="n">600 · press</div><div class="h">#C28C30</div></div>
      </div>
    </div>
  </div>
</div>
</body></html>
