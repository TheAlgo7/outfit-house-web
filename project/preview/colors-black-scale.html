<!doctype html>
<html><head><meta charset="utf-8"><title>Colors — Black scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 160px; background: var(--bg); padding: 24px; box-sizing: border-box; }
  .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; height: 100%; }
  .sw { display: flex; flex-direction: column; justify-content: flex-end; padding: 10px 12px; color: var(--fg); border: 1px solid var(--border); }
  .sw .n { font-family: var(--font-heading); font-weight: 700; font-size: 11px; letter-spacing: 0.06em; text-transform: uppercase; }
  .sw .h { font-family: var(--font-mono); font-size: 10px; opacity: 0.65; margin-top: 2px; }
  .label { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); margin-bottom: 12px; }
</style></head>
<body>
<div class="card">
  <div class="label">Black scale · Surfaces & dividers on dark</div>
  <div class="row">
    <div class="sw" style="background:#000000;"><div class="n">900</div><div class="h">#000000</div></div>
    <div class="sw" style="background:#0A0A0A;"><div class="n">800</div><div class="h">#0A0A0A</div></div>
    <div class="sw" style="background:#141414;"><div class="n">700 · card</div><div class="h">#141414</div></div>
    <div class="sw" style="background:#1C1C1C;"><div class="n">600 · hover</div><div class="h">#1C1C1C</div></div>
    <div class="sw" style="background:#2A2A2A;"><div class="n">500 · divider</div><div class="h">#2A2A2A</div></div>
  </div>
</div>
</body></html>
