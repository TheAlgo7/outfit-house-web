<!doctype html>
<html><head><meta charset="utf-8"><title>Shadows</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 200px; background: #0A0A0A; padding: 28px; box-sizing: border-box; }
  .meta { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); margin-bottom: 24px; }
  .row { display: flex; gap: 28px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .b { width: 110px; height: 64px; background: var(--bg-elev); border: 1px solid var(--border); }
  .name { font-family: var(--font-mono); font-size: 10px; color: var(--fg-muted); }
</style></head>
<body>
<div class="card">
  <div class="meta">Elevation · neutral black · single yellow glow for accent CTA</div>
  <div class="row">
    <div class="item"><div class="b"></div><div class="name">flat</div></div>
    <div class="item"><div class="b" style="box-shadow:0 1px 2px rgba(0,0,0,.30)"></div><div class="name">shadow-1</div></div>
    <div class="item"><div class="b" style="box-shadow:0 4px 12px rgba(0,0,0,.35)"></div><div class="name">shadow-2 · cards</div></div>
    <div class="item"><div class="b" style="box-shadow:0 12px 32px rgba(0,0,0,.45)"></div><div class="name">shadow-3 · modals</div></div>
    <div class="item"><div class="b" style="background:#E3A848; box-shadow:0 0 32px rgba(227,168,72,.40)"></div><div class="name">glow-yellow</div></div>
  </div>
</div>
</body></html>
