<!doctype html>
<html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; padding: 0; }
  .card { width: 700px; height: 280px; background: var(--bg); padding: 32px; box-sizing: border-box; }
  .meta { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); margin-bottom: 8px; }
  .specimen { font-family: var(--font-display); color: var(--fg); line-height: 0.92; text-transform: uppercase; }
  .xl { font-size: 96px; }
  .lg { font-size: 64px; }
  .md { font-size: 44px; color: var(--fg-warm); margin-top: 4px; }
  .stack > div + div { margin-top: 4px; }
  .specs { display: flex; gap: 18px; margin-top: 18px; font-family: var(--font-mono); font-size: 11px; color: var(--fg-subtle); }
</style></head>
<body>
<div class="card">
  <div class="meta">Display · Bebas Neue · UPPERCASE</div>
  <div class="stack">
    <div class="specimen xl">OUTFIT HOUSE</div>
    <div class="specimen md">SNEAKERS · STREETWEAR</div>
  </div>
  <div class="specs">
    <span>96 / 64 / 44 px</span>
    <span>line-height 0.92</span>
    <span>tracking 0</span>
    <span>weight 400</span>
  </div>
</div>
</body></html>
