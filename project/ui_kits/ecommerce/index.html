<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>The Outfit House — Storefront</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" href="../../assets/logo-crown.png"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; min-height: 100vh; }
  .hero {
    position: relative; padding: 96px 32px 64px; max-width: 1280px; margin: 0 auto;
    display: grid; grid-template-columns: 1.1fr 1fr; gap: 48px; align-items: center;
  }
  .hero .eyebrow { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--accent); font-weight: 600; margin-bottom: 16px; }
  .hero h1 { font-family: var(--font-display); font-size: clamp(64px, 9vw, 128px); line-height: 0.92; text-transform: uppercase; color: var(--fg); margin: 0 0 24px; }
  .hero h1 .accent { color: var(--accent); }
  .hero p { font-size: 16px; color: var(--fg-muted); line-height: 1.6; max-width: 460px; margin: 0 0 32px; }
  .hero-img { aspect-ratio: 4/5; background: #F2ECDD; overflow: hidden; position: relative; }
  .hero-img img { width: 100%; height: 100%; object-fit: cover; }
  .hero-img .float {
    position: absolute; left: 18px; right: 18px; bottom: 18px;
    background: rgba(20,20,20,0.55); backdrop-filter: blur(16px);
    border: 1px solid rgba(242,236,221,0.10); padding: 12px 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .hero-img .float .l { font-family: var(--font-heading); font-size: 10px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--accent); font-weight: 600; }
  .hero-img .float .r { font-family: var(--font-heading); color: var(--fg); font-weight: 700; }
  .section { max-width: 1280px; margin: 0 auto; padding: 64px 32px 0; }
  .sec-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 32px; }
  .sec-head h2 { font-family: var(--font-display); font-size: clamp(36px, 4vw, 56px); text-transform: uppercase; color: var(--fg); margin: 0; }
  .sec-head a { font-family: var(--font-heading); font-size: 11px; letter-spacing: var(--tracking-wider); text-transform: uppercase; color: var(--fg-muted); border-bottom: none; }
  .strip {
    background: var(--accent); color: #000; padding: 12px 0; overflow: hidden;
    font-family: var(--font-heading); font-size: 12px; font-weight: 700;
    letter-spacing: var(--tracking-wider); text-transform: uppercase;
  }
  .strip-track { display: flex; gap: 48px; white-space: nowrap; animation: scroll 40s linear infinite; }
  @keyframes scroll { from { transform: translateX(0) } to { transform: translateX(-50%) } }
</style>
</head>
<body>
<div id="root"></div>
<script src="data.js"></script>
<script type="text/babel" src="Buttons.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="ProductCard.jsx"></script>
<script type="text/babel" src="ProductDetail.jsx"></script>
<script type="text/babel" src="Cart.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

function App() {
  const [view, setView] = useState('home');
  const [active, setActive] = useState(null);
  const [cart, setCart] = useState([]);
  const [cartOpen, setCartOpen] = useState(false);

  useEffect(() => { if (window.lucide) lucide.createIcons(); }, [view]);

  const openProduct = (p) => { setActive(p); setView('product'); window.scrollTo(0,0); };
  const addToCart = (p, size) => {
    setCart(c => [...c, { ...p, size }]);
    setCartOpen(true);
  };

  return (
    <>
      <Header cartCount={cart.length} onNav={(v)=>setView(v)} onCart={()=>setCartOpen(true)}/>
      {view === 'home' && (
        <>
          <section className="hero">
            <div>
              <div className="eyebrow">▲ Sneakers · Streetwear · Premium</div>
              <h1>Replica.<br/><span className="accent">Reimagined.</span></h1>
              <p>Curated 7A and UA-grade sneakers. We explain quality — stitch counts, sole construction, original tooling — so you know what you're paying for.</p>
              <div style={{ display: 'flex', gap: 12 }}>
                <Btn kind="primary">Shop Sneakers</Btn>
                <Btn kind="secondary">Quality Guide</Btn>
              </div>
            </div>
            <div className="hero-img">
              <img src="../../assets/product-airjordan.jpg"/>
              <div className="float">
                <span className="l">7A · Featured</span>
                <span className="r">{formatINR(4499)}</span>
              </div>
            </div>
          </section>

          <div className="strip">
            <div className="strip-track">
              {Array.from({length: 2}).flatMap((_,i) => ['Free Shipping Across India','·','Pay on Delivery','·','Hand-Checked QC','·','7-Day Exchange','·','New Drops Every Friday','·']).map((t,i) => <span key={i}>{t}</span>)}
            </div>
          </div>

          <section className="section">
            <div className="sec-head">
              <h2>Featured Drops</h2>
              <a href="#">View all →</a>
            </div>
            <ProductGrid items={PRODUCTS} onOpen={openProduct}/>
          </section>

          <section className="section" style={{ marginTop: 96 }}>
            <div className="sec-head">
              <h2>Crown Picks</h2>
              <a href="#">All picks →</a>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1.4fr 1fr', gap: 24 }}>
              <div style={{ position: 'relative', aspectRatio: '16/10', overflow: 'hidden' }}>
                <img src="../../assets/insta-post-tote.jpg" style={{ width: '100%', height: '100%', objectFit: 'cover' }}/>
                <div style={{
                  position: 'absolute', left: 24, bottom: 24,
                  background: 'rgba(20,20,20,0.55)', backdropFilter: 'blur(16px)',
                  border: '1px solid rgba(242,236,221,0.10)', padding: '14px 18px',
                }}>
                  <div style={{ fontFamily: 'var(--font-heading)', fontSize: 10, letterSpacing: 'var(--tracking-wider)', textTransform: 'uppercase', color: 'var(--accent)', fontWeight: 600 }}>Free with orders above ₹6,000</div>
                  <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, color: 'var(--fg)', textTransform: 'uppercase', marginTop: 4 }}>Signature Tote</div>
                </div>
              </div>
              <ProductCard p={PRODUCTS[1]} onOpen={openProduct}/>
            </div>
          </section>
          <Footer/>
        </>
      )}
      {view === 'product' && active && (
        <ProductDetail p={active} onBack={()=>setView('home')} onAdd={addToCart}/>
      )}
      <Cart open={cartOpen} items={cart} onClose={()=>setCartOpen(false)} onRemove={(idx)=>setCart(c=>c.filter((_,i)=>i!==idx))} onCheckout={()=>alert('Checkout flow placeholder')}/>
    </>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
