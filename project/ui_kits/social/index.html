<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>The Outfit House — Social Templates</title>
<link rel="icon" href="../../assets/logo-crown.png"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  body { margin: 0; min-height: 100vh; padding: 64px 32px; }
  .page { max-width: 1820px; margin: 0 auto; }
  .page h1 { font-family: var(--font-display); font-size: 56px; text-transform: uppercase; color: var(--fg); margin: 0 0 8px; }
  .page p { color: var(--fg-muted); margin: 0 0 48px; max-width: 640px; }
  .grid { display: grid; grid-template-columns: repeat(3, 540px); gap: 64px 32px; justify-content: start; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="PostFrame.jsx"></script>
<script type="text/babel">
function App() {
  return (
    <div className="page">
      <h1>Instagram · 1080²</h1>
      <p>Three post variants — product drop, quality breakdown, and brand hero. Frames are shown at 50% scale; the inner content is rendered at native 1080² for export.</p>
      <div className="grid">

        {/* 1. PRODUCT DROP — image-led, glass spec panel */}
        <PostFrame label="01 · Product Drop">
          <PostHeader/>
          <div style={{ position: 'absolute', inset: 0, background: '#F2ECDD' }}>
            <img src="../../assets/product-airjordan.jpg" style={{ position: 'absolute', inset: 0, width: '100%', height: '100%', objectFit: 'cover' }}/>
            <div style={{ position: 'absolute', inset: 0, background: 'linear-gradient(180deg, rgba(0,0,0,0.45) 0%, transparent 30%, transparent 60%, rgba(0,0,0,0.7) 100%)' }}/>
          </div>
          <div style={{ position: 'absolute', left: 48, right: 48, bottom: 160, zIndex: 4 }}>
            <div style={{ display: 'inline-block', background: 'var(--accent)', color: '#000', fontFamily: 'var(--font-heading)', fontSize: 16, fontWeight: 700, letterSpacing: 'var(--tracking-wider)', textTransform: 'uppercase', padding: '8px 14px', marginBottom: 16 }}>New · 7A</div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 120, color: 'var(--fg)', textTransform: 'uppercase', lineHeight: 0.92 }}>AJ1 Mid<br/><span style={{ color: 'var(--accent)' }}>Panda</span></div>
            <div style={{ fontFamily: 'var(--font-heading)', fontSize: 32, color: 'var(--fg)', fontWeight: 700, marginTop: 16 }}>₹4,499 <span style={{ color: 'var(--fg-subtle)', textDecoration: 'line-through', fontWeight: 400, fontSize: 24, marginLeft: 12 }}>₹14,995</span></div>
          </div>
          <PostFooter cta="Shop Now"/>
        </PostFrame>

        {/* 2. QUALITY BREAKDOWN — spec card on warm surface */}
        <PostFrame bg="#0A0A0A" label="02 · Quality Spec">
          <PostHeader/>
          <div style={{ position: 'absolute', top: 220, left: 48, right: 48 }}>
            <div style={{ fontFamily: 'var(--font-heading)', fontSize: 22, letterSpacing: 'var(--tracking-wider)', textTransform: 'uppercase', color: 'var(--accent)', fontWeight: 600 }}>What is 7A?</div>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 96, color: 'var(--fg)', textTransform: 'uppercase', lineHeight: 0.95, marginTop: 16 }}>Same shoe.<br/>Honest price.</div>
          </div>
          <div style={{ position: 'absolute', left: 48, right: 48, bottom: 180 }}>
            {[
              ['Upper', 'Genuine leather'],
              ['Sole', 'Stitched, not glued'],
              ['Box', 'Original tooling'],
              ['QC', 'Hand-checked in Delhi'],
            ].map(([k, v]) => (
              <div key={k} style={{ display: 'grid', gridTemplateColumns: '180px 1fr', gap: 24, padding: '16px 0', borderBottom: '1px solid rgba(242,236,221,0.10)' }}>
                <span style={{ fontFamily: 'var(--font-heading)', fontSize: 18, letterSpacing: 'var(--tracking-wider)', textTransform: 'uppercase', color: 'var(--fg-muted)', fontWeight: 600 }}>{k}</span>
                <span style={{ fontFamily: 'var(--font-heading)', fontSize: 26, color: 'var(--fg)', fontWeight: 600 }}>{v}</span>
              </div>
            ))}
          </div>
          <PostFooter handle="@theoutfithouse" cta="Learn More"/>
        </PostFrame>

        {/* 3. BRAND HERO — eggshell editorial */}
        <PostFrame bg="#F2ECDD" label="03 · Brand Hero">
          <div style={{ position: 'absolute', top: 80, left: 80, right: 80, display: 'flex', alignItems: 'center', gap: 16 }}>
            <img src="../../assets/logo-crown.png" style={{ width: 64, height: 64, objectFit: 'contain' }}/>
            <div style={{ fontFamily: 'var(--font-heading)', fontSize: 18, letterSpacing: 'var(--tracking-wider)', textTransform: 'uppercase', color: 'rgba(0,0,0,.55)', fontWeight: 600 }}>Est. New Delhi</div>
          </div>
          <div style={{ position: 'absolute', inset: '180px 80px 200px', display: 'flex', flexDirection: 'column', justifyContent: 'center' }}>
            <div style={{ fontFamily: 'var(--font-brush)', fontSize: 240, color: '#000', lineHeight: 0.85 }}>The<br/>Outfit<br/>House</div>
          </div>
          <div style={{ position: 'absolute', left: 80, right: 80, bottom: 160, height: 12, background: 'var(--accent)' }}/>
          <div style={{ position: 'absolute', left: 80, right: 80, bottom: 80, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontFamily: 'var(--font-heading)', fontSize: 20, fontWeight: 700, letterSpacing: 'var(--tracking-wider)', textTransform: 'uppercase', color: '#000' }}>Sneakers · Streetwear</span>
            <span style={{ fontFamily: 'var(--font-heading)', fontSize: 20, fontWeight: 700, letterSpacing: 'var(--tracking-wider)', textTransform: 'uppercase', color: '#000' }}>Premium · 2026</span>
          </div>
        </PostFrame>

      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
