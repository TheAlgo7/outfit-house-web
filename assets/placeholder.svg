<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600" role="img" aria-label="Photo on request">
  <defs>
    <radialGradient id="g" cx="50%" cy="38%" r="75%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#060403"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" fill="none" stroke="rgba(242,236,221,0.05)" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="600" height="600" fill="url(#g)"/>
  <rect width="600" height="600" fill="url(#grid)"/>
  <text x="300" y="270" text-anchor="middle" font-family="'Bebas Neue','Oswald',sans-serif" font-size="120" letter-spacing="2" fill="#E3A848">TOH</text>
  <text x="300" y="320" text-anchor="middle" font-family="'Archivo','Inter',sans-serif" font-size="18" letter-spacing="6" fill="rgba(242,236,221,0.65)" text-transform="uppercase">THE OUTFIT HOUSE</text>
  <text x="300" y="372" text-anchor="middle" font-family="'Archivo','Inter',sans-serif" font-size="14" font-weight="600" letter-spacing="4" fill="rgba(242,236,221,0.45)">PHOTO ON REQUEST</text>
</svg>
