<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Category — The Outfit House</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="icon" href="assets/logo-crown.png"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<link rel="stylesheet" href="site.css"/>
<style>
  .cat-hero {
    padding: 80px 32px 56px; max-width: 1280px; margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .cat-hero .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-heading); font-size: 11px; font-weight: 600;
    letter-spacing: var(--tracking-wider); text-transform: uppercase;
    color: var(--accent); margin-bottom: 24px;
    padding: 8px 14px; border: 1px solid rgba(227,168,72,0.30);
  }
  .cat-hero h1 {
    font-family: var(--font-display); font-size: clamp(56px, 9vw, 132px);
    line-height: 0.9; margin: 0; text-transform: uppercase; letter-spacing: -0.005em;
  }
  .cat-hero p { max-width: 560px; color: var(--fg-muted); font-size: 16px;
    line-height: 1.6; margin: 24px 0 0; }

  .filter-bar {
    position: sticky; top: 68px; z-index: 40;
    background: rgba(0,0,0,0.85); backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
  }
  .tabs {
    display: flex; max-width: 1280px; margin: 0 auto; padding: 0 32px;
    gap: 0; overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 18px 0; margin-right: 32px;
    font-family: var(--font-heading); font-size: 11px; font-weight: 700;
    letter-spacing: var(--tracking-wide); text-transform: uppercase;
    color: var(--fg-muted); cursor: pointer; background: transparent; border: none;
    border-bottom: 2px solid transparent; white-space: nowrap;
    transition: color var(--dur-fast);
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--fg); }
  .tab .count {
    display: inline-block; margin-left: 6px;
    font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle);
  }
  .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    max-width: 1280px; margin: 0 auto; padding: 18px 32px;
    font-family: var(--font-heading); font-size: 11px; font-weight: 600;
    letter-spacing: var(--tracking-wide); text-transform: uppercase;
    color: var(--fg-muted);
  }
  .meta-row .count b { color: var(--fg); }
  .meta-row select {
    background: transparent; color: var(--fg);
    border: 1px solid var(--border-strong); padding: 8px 12px;
    font-family: var(--font-heading); font-size: 11px;
    text-transform: uppercase; letter-spacing: var(--tracking-wide);
  }

  .grid-wrap { padding: 56px 0 96px; max-width: 1280px; margin: 0 auto; padding-left: 32px; padding-right: 32px; }
  .empty {
    padding: 120px 32px; text-align: center; color: var(--fg-muted);
    font-family: var(--font-heading); letter-spacing: var(--tracking-wide); text-transform: uppercase;
  }

  @media (max-width: 900px) {
    .cat-hero { padding: 56px 20px 40px; }
    .filter-bar { top: 60px; }
    .tabs { padding: 0 20px; }
    .meta-row { padding: 14px 20px; }
    .grid-wrap { padding: 32px 20px 64px; }
  }
</style>
</head>
<body>

<div id="header-mount"></div>

<section class="cat-hero">
  <div class="eyebrow" id="cat-eyebrow">01 · Category</div>
  <h1 id="cat-title">Category</h1>
  <p id="cat-blurb">Loading…</p>
</section>

<div class="filter-bar">
  <div class="tabs" id="tabs"></div>
  <div class="meta-row">
    <div class="count">Showing <b id="count">0</b> pieces</div>
    <select id="sort">
      <option value="feat">Featured</option>
      <option value="low">Price: low → high</option>
      <option value="high">Price: high → low</option>
    </select>
  </div>
</div>

<section class="grid-wrap">
  <div class="products-grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">No pieces in this tier yet — check back soon.</div>
</section>

<div id="footer-mount"></div>

<script src="site.js"></script>
<script>
  injectSprite();

  // Determine category
  const params = new URLSearchParams(location.search);
  const catKey = params.get('cat') || 'sneakers';
  const cat = CATEGORIES[catKey] || CATEGORIES.sneakers;

  document.title = cat.title + ' — The Outfit House';
  document.getElementById('cat-eyebrow').innerHTML = '<span style="width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 10px var(--accent);"></span> ' + cat.tag;
  document.getElementById('cat-title').textContent = cat.title;
  document.getElementById('cat-blurb').textContent = cat.blurb;

  document.getElementById('header-mount').innerHTML = renderHeader(cat.label);
  document.getElementById('footer-mount').innerHTML = renderFooter();

  // Filter products by category
  const ALL = PRODUCTS.filter(p => p.cat === catKey);
  const TIER_COUNTS = {
    'all':   ALL.length,
    'Entry': ALL.filter(p => p.grade === 'Entry').length,
    '7A':    ALL.filter(p => p.grade === '7A').length,
    'UA 1:1':ALL.filter(p => p.grade === 'UA 1:1').length,
  };

  const tabs = [
    { k:'all',    label:'All' },
    { k:'Entry',  label:'Entry' },
    { k:'7A',     label:'7A' },
    { k:'UA 1:1', label:'UA 1:1' },
  ];

  let activeTier = 'all';
  // Honor #tier-key in hash
  const hashKey = (location.hash || '').replace('#','');
  if (hashKey === 'entry') activeTier = 'Entry';
  else if (hashKey === '7a') activeTier = '7A';
  else if (hashKey === 'ua') activeTier = 'UA 1:1';

  function renderTabs() {
    document.getElementById('tabs').innerHTML = tabs.map(t =>
      `<button class="tab ${activeTier===t.k?'active':''}" onclick="setTier('${t.k}')">${t.label}<span class="count">${TIER_COUNTS[t.k]}</span></button>`
    ).join('');
  }
  window.setTier = function(k) { activeTier = k; renderTabs(); render(); };

  function render() {
    let list = (activeTier === 'all') ? ALL : ALL.filter(p => p.grade === activeTier);
    const mode = document.getElementById('sort').value;
    const num = s => parseInt(s.replace(/[^0-9]/g,''), 10);
    if (mode === 'low')  list = [...list].sort((a,b) => num(a.price) - num(b.price));
    if (mode === 'high') list = [...list].sort((a,b) => num(b.price) - num(a.price));
    document.getElementById('count').textContent = list.length;
    document.getElementById('grid').innerHTML = list.map(renderProductCard).join('');
    document.getElementById('empty').style.display = list.length ? 'none' : 'block';
  }
  document.getElementById('sort').addEventListener('change', render);
  renderTabs(); render();
</script>
</body>
</html>
