<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Category | The Outfit House</title>
<meta name="description" content="Shop premium sneakers, apparel, bottomwear and accessories at The Outfit House. Filter by Entry, Standard or Vault tier. Real photos, ships PAN-India."/>
<script>
(function() {
  var s = new URLSearchParams(location.search);
  var cat = s.get('cat');
  if (!cat) {
    var seg = location.pathname.replace(/^\//, '').split('/')[0];
    if (['sneakers','apparel','bottomwear','accessories'].indexOf(seg) !== -1) cat = seg;
  }
  var M = {
    'sneakers':    ['The Sneaker Vault | The Outfit House',    'Shop premium Air Jordan, New Balance and more in Entry, Standard and Vault tiers at The Outfit House, New Delhi. Real photos before dispatch.'],
    'apparel':     ['Topwear | The Outfit House',              'Premium tees, hoodies and overshirts in Entry, Standard and Vault tiers at The Outfit House. Ships PAN-India.'],
    'bottomwear':  ['Streetwear Bottoms | The Outfit House',   'Premium cargos, sweats and denim in Entry, Standard and Vault tiers. Hand-checked in New Delhi. Ships PAN-India.'],
    'accessories': ['Finishing Touches | The Outfit House',    'Caps, totes, socks and accessories in Entry, Standard and Vault tiers at The Outfit House. Ships PAN-India.']
  };
  var d = cat && M[cat];
  if (!d) return;
  document.title = d[0];
  var desc = document.querySelector('meta[name="description"]');
  if (desc) desc.content = d[1];
  var c = document.createElement('link');
  c.rel = 'canonical';
  c.href = 'https://theoutfithouse.in/' + cat;
  document.head.appendChild(c);
}());
</script>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="shortcut icon" href="/favicon.ico"/>
<link rel="icon" type="image/png" href="https://theoutfithouse.in/assets/logo-black.png"/>
<link rel="apple-touch-icon" href="https://theoutfithouse.in/assets/logo-black.png"/>
<meta property="og:type" content="website"/>
<meta property="og:title" content="Category | The Outfit House"/>
<meta property="og:description" content="Shop premium sneakers, apparel and accessories at The Outfit House across three quality tiers."/>
<meta property="og:image" content="https://theoutfithouse.in/assets/social-preview-tho.jpg"/>
<meta name="twitter:card" content="summary_large_image"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/bebasneue/v16/JTUSjIg69CK48gW7PXoo9Wlhyw.woff2"/>
<link rel="preload" as="font" type="font/woff2" crossorigin href="https://fonts.gstatic.com/s/archivo/v25/k3kPo8UDI-1M0wlSV9XAw6lQkqWY8Q82sLydOxI.woff2"/>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800;900&display=swap"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Archivo:wght@400;500;600;700;800;900&display=swap"/>
<link rel="stylesheet" href="colors_and_type.css"/>
<link rel="stylesheet" href="site.css"/>
<style>
  .cat-hero {
    padding: 80px 32px 56px; max-width: 1280px; margin: 0 auto;
    border-bottom: 1px solid var(--border);
  }
  .cat-hero .eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-family: var(--font-heading); font-size: 11px; font-weight: 600;
    letter-spacing: var(--tracking-wider); text-transform: uppercase;
    color: var(--accent); margin-bottom: 24px;
    padding: 8px 14px; border: 1px solid color-mix(in srgb, var(--accent) 30%, transparent);
  }
  .cat-hero h1 {
    font-family: var(--font-display); font-size: clamp(56px, 9vw, 132px);
    line-height: 0.9; margin: 0; text-transform: uppercase; letter-spacing: -0.005em;
  }
  .cat-hero p { max-width: 560px; color: var(--fg-muted); font-size: 16px;
    line-height: 1.6; margin: 24px 0 0; }

  .filter-bar {
    position: sticky; top: 68px; z-index: 40;
    background: var(--surface-dropdown);
    border-bottom: 1px solid var(--border);
  }
  .tabs {
    display: flex; max-width: 1280px; margin: 0 auto; padding: 0 32px;
    gap: 0; overflow-x: auto; scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 18px 12px; margin-right: 8px;
    font-family: var(--font-heading); font-size: 11px; font-weight: 700;
    letter-spacing: var(--tracking-wide); text-transform: uppercase;
    color: var(--fg-muted); cursor: pointer; background: transparent; border: none;
    border-bottom: 2px solid transparent; white-space: nowrap;
    transition: color var(--dur-fast); min-width: 44px;
  }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab:hover { color: var(--fg); }
  .tab .count {
    display: inline-block; margin-left: 6px;
    font-family: var(--font-mono); font-size: 10px; color: var(--fg-subtle);
  }
  .meta-row {
    display: flex; justify-content: space-between; align-items: center;
    max-width: 1280px; margin: 0 auto; padding: 18px 32px;
    font-family: var(--font-heading); font-size: 11px; font-weight: 600;
    letter-spacing: var(--tracking-wide); text-transform: uppercase;
    color: var(--fg-muted);
  }
  .meta-row .count b { color: var(--fg); }
  .sort-drop { position: relative; }
  .sort-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: transparent; color: var(--fg);
    border: 1px solid var(--border-strong); padding: 8px 12px;
    font-family: var(--font-heading); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: var(--tracking-wide);
    cursor: pointer; white-space: nowrap;
    transition: border-color var(--dur-fast), color var(--dur-fast);
  }
  .sort-btn:hover { border-color: var(--fg); }
  .sort-btn svg { width: 10px; height: 10px; flex-shrink: 0; transition: transform var(--dur-base) var(--ease-out); }
  .sort-drop.open .sort-btn svg { transform: rotate(180deg); }
  .sort-menu {
    position: absolute; right: 0; top: calc(100% + 4px);
    background: var(--surface-dropdown); border: 1px solid var(--border);
    min-width: 190px; list-style: none; padding: 0; margin: 0; z-index: 60;
    opacity: 0; pointer-events: none; transform: translateY(-6px);
    transition: opacity var(--dur-base) var(--ease-out), transform var(--dur-base) var(--ease-out);
  }
  .sort-drop.open .sort-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .sort-opt {
    padding: 13px 16px; border-bottom: 1px solid var(--border);
    font-family: var(--font-heading); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: var(--tracking-wide);
    color: var(--fg-muted); cursor: pointer;
    transition: color var(--dur-fast), background var(--dur-fast);
  }
  .sort-opt:last-child { border-bottom: none; }
  .sort-opt:hover { color: var(--fg); background: var(--surface-hover); }
  .sort-opt.active { color: var(--accent); }

  .grid-wrap { padding: 56px 0 96px; max-width: 1280px; margin: 0 auto; padding-left: 32px; padding-right: 32px; }
  .empty {
    padding: 120px 32px; text-align: center; color: var(--fg-muted);
    font-family: var(--font-heading); letter-spacing: var(--tracking-wide); text-transform: uppercase;
  }

  @media (max-width: 900px) {
    .cat-hero { padding: 56px 20px 40px; }
    .filter-bar { top: 60px; }
    .tabs { padding: 0 20px; }
    .meta-row { padding: 14px 20px; }
    .grid-wrap { padding: 32px 20px 64px; }
  }
</style>
</head>
<body>
<a href="#main-content" class="skip-link">Skip to content</a>
<div id="header-mount"></div>

<main id="main-content">
<section class="cat-hero">
  <div class="eyebrow" id="cat-eyebrow">01 · Category</div>
  <h1 id="cat-title">Category</h1>
  <p id="cat-blurb">Loading…</p>
</section>

<div class="filter-bar">
  <div class="tabs" id="tabs"></div>
  <div class="meta-row">
    <div class="count">Showing <b id="count">0</b> pieces</div>
    <div class="sort-drop" id="sort-wrap" role="group" aria-label="Sort by">
      <button class="sort-btn" id="sort-btn" type="button" aria-haspopup="listbox" aria-expanded="false">
        <span id="sort-label">Featured</span>
        <svg><use href="#chevron-down"/></svg>
      </button>
      <ul class="sort-menu" id="sort-menu" role="listbox" aria-label="Sort options">
        <li class="sort-opt active" role="option" aria-selected="true"  data-val="feat">Featured</li>
        <li class="sort-opt"        role="option" aria-selected="false" data-val="low">Price: Low → High</li>
        <li class="sort-opt"        role="option" aria-selected="false" data-val="high">Price: High → Low</li>
      </ul>
    </div>
  </div>
</div>

<section class="grid-wrap">
  <div class="products-grid" id="grid"></div>
  <div class="empty" id="empty" style="display:none">No pieces in this tier yet. Check back soon.</div>
</section>

</main>

<div id="footer-mount"></div>

<script src="site.js"></script>
<script>
  injectSprite(); // supports clean URLs (/sneakers) and legacy query params
  const params = new URLSearchParams(location.search);
  let catKey = params.get('cat');
  if (!catKey) {
    const seg = location.pathname.replace(/^\//, '').split('/')[0];
    if (window.CATEGORIES[seg]) catKey = seg;
  }
  catKey = catKey || 'sneakers';
  const cat = CATEGORIES[catKey] || CATEGORIES.sneakers;

  document.title = cat.title + ' | The Outfit House';

  // SEO — update dynamic meta
  var canonicalEl = document.createElement('link');
  canonicalEl.rel = 'canonical';
  canonicalEl.href = 'https://theoutfithouse.in/' + catKey;
  document.head.appendChild(canonicalEl);
  document.querySelector('meta[name="description"]').content = cat.title + ': shop premium ' + cat.label.toLowerCase() + ' at The Outfit House. Filter by Entry, Standard or Vault tier. Real photos before dispatch.';
  document.querySelector('meta[property="og:title"]').content = cat.title + ' | The Outfit House';
  document.querySelector('meta[property="og:description"]').content = cat.title + ': premium ' + cat.label.toLowerCase() + ' across three quality tiers.';
  document.getElementById('cat-eyebrow').innerHTML = '<span style="width:7px;height:7px;border-radius:50%;background:var(--accent);display:inline-block;"></span> ' + cat.tag;
  document.getElementById('cat-title').textContent = cat.title;
  document.getElementById('cat-blurb').textContent = cat.blurb;

  document.getElementById('header-mount').innerHTML = renderHeader(cat.label);
  document.getElementById('footer-mount').innerHTML = renderFooter();
  initHeader();

  // Filter products by category
  const ALL = PRODUCTS.filter(p => p.cat === catKey);
  const TIER_COUNTS = {
    'all':      ALL.length,
    'Entry':    ALL.filter(p => p.grade === 'Entry').length,
    'Standard': ALL.filter(p => p.grade === 'Standard').length,
    'Vault':    ALL.filter(p => p.grade === 'Vault').length,
  };

  const tabs = [
    { k:'all',      label:'All' },
    { k:'Entry',    label:'Entry' },
    { k:'Standard', label:'Standard' },
    { k:'Vault',    label:'Vault' },
  ];

  let activeTier = 'all';
  // Honor #tier-key in hash
  const hashKey = (location.hash || '').replace('#','');
  if (hashKey === 'entry')    activeTier = 'Entry';
  else if (hashKey === 'standard') activeTier = 'Standard';
  else if (hashKey === 'vault')    activeTier = 'Vault';

  function renderTabs() {
    document.getElementById('tabs').innerHTML = tabs.map(t =>
      `<button class="tab ${activeTier===t.k?'active':''}" onclick="setTier('${t.k}')" aria-pressed="${activeTier===t.k}">${t.label}<span class="count">${TIER_COUNTS[t.k]}</span></button>`
    ).join('');
  }
  window.setTier = function(k) { activeTier = k; renderTabs(); render(); };

  let sortMode = 'feat';

  function render() {
    let list = (activeTier === 'all') ? ALL : ALL.filter(p => p.grade === activeTier);
    const num = s => parseInt(s.replace(/[^0-9]/g,''), 10);
    if (sortMode === 'low')  list = [...list].sort((a,b) => num(a.price) - num(b.price));
    if (sortMode === 'high') list = [...list].sort((a,b) => num(b.price) - num(a.price));
    document.getElementById('count').textContent = list.length;
    var gridEl = document.getElementById('grid');
    gridEl.innerHTML = '';
    list.forEach(function(p) { gridEl.appendChild(renderProductCard(p)); });
    document.getElementById('empty').style.display = list.length ? 'none' : 'block';
  }

  // Custom sort dropdown
  (function() {
    var wrap = document.getElementById('sort-wrap');
    var btn  = document.getElementById('sort-btn');
    var menu = document.getElementById('sort-menu');
    var lbl  = document.getElementById('sort-label');
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      var open = wrap.classList.toggle('open');
      btn.setAttribute('aria-expanded', String(open));
    });
    menu.addEventListener('click', function(e) {
      var opt = e.target.closest('[data-val]');
      if (!opt) return;
      sortMode = opt.getAttribute('data-val');
      lbl.textContent = opt.textContent;
      Array.from(menu.children).forEach(function(o) {
        var sel = o === opt;
        o.classList.toggle('active', sel);
        o.setAttribute('aria-selected', String(sel));
      });
      wrap.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
      render();
    });
    document.addEventListener('click', function() {
      wrap.classList.remove('open');
      btn.setAttribute('aria-expanded', 'false');
    });
  }());

  renderTabs(); render();
</script>
</body>
</html>
